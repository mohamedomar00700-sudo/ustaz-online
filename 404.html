<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>أكاديمية أستاذ أونلاين</title>
    <script type="text/javascript">
      var l = window.location;
      var path = l.pathname;
      var repoName = 'ustaz-online';
      var basePath = '';
      var route = '';
      if (path.indexOf('/' + repoName) !== -1) {
        basePath = '/' + repoName;
        route = path.slice(path.indexOf('/' + repoName) + ('/' + repoName).length);
      } else {
        basePath = '';
        route = path;
      }
      route = route.replace(/^\/+/, '');
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        basePath + '/#' + (route ? '/' + route : '') +
        l.search +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
